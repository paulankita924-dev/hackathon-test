<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crypto Terminal Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0b0f19;
            --card-bg: #131a2e;
            --accent-green: #00ff87;
            --accent-blue: #00e5ff;
            --text-main: #ffffff;
            --text-muted: #707e94;
            --border: #1e2942;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            padding: 40px 20px;
            min-height: 100vh;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
        }

        header {
            margin-bottom: 32px;
            border-bottom: 1px solid var(--border);
            padding-bottom: 20px;
        }

        header h1 {
            font-size: 2.2rem;
            font-weight: 700;
            background: linear-gradient(45deg, var(--accent-green), var(--accent-blue));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        header p {
            color: var(--text-muted);
            margin-top: 6px;
            font-size: 0.95rem;
        }

        /* The Grid Matrix Layout */
        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 24px;
        }

        .card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 24px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.25);
            transition: transform 0.2s, border-color 0.2s;
        }

        .card:hover {
            transform: translateY(-2px);
            border-color: #2b3a5c;
        }

        /* Responsive layout for mobile/smaller monitors */
        @media (max-width: 768px) {
            .dashboard-grid { grid-template-columns: 1fr; }
        }

        .crypto-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }

        .crypto-name {
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--text-muted);
        }

        .badge {
            font-size: 0.75rem;
            font-weight: 700;
            padding: 4px 10px;
            border-radius: 20px;
            text-transform: uppercase;
            background: rgba(0, 255, 135, 0.1);
            color: var(--accent-green);
        }

        .badge.eth {
            background: rgba(0, 229, 255, 0.1);
            color: var(--accent-blue);
        }

        .price {
            font-size: 2.5rem;
            font-weight: 700;
            letter-spacing: -1px;
        }

        /* Forms and Controls */
        .form-title {
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 20px;
        }

        .input-group {
            margin-bottom: 16px;
        }

        .input-group label {
            display: block;
            font-size: 0.8rem;
            color: var(--text-muted);
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        input {
            width: 100%;
            padding: 12px 16px;
            background: #080c14;
            border: 1px solid var(--border);
            border-radius: 8px;
            color: #fff;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.2s;
        }

        input:focus { border-color: var(--accent-blue); }

        button {
            width: 100%;
            background: linear-gradient(135deg, var(--accent-green), #00cc6a);
            color: #0b0f19;
            border: none;
            padding: 14px;
            font-size: 1rem;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            transition: filter 0.2s;
        }

        button:hover { filter: brightness(1.1); }

        #alert-message {
            margin-top: 12px;
            padding: 10px;
            border-radius: 6px;
            font-size: 0.9rem;
            display: none;
        }

        .success { background: rgba(0,255,135,0.1); color: var(--accent-green); display: block !important; }
        .error { background: rgba(255,75,75,0.1); color: #ff4b4b; display: block !important; }

        /* Active Alerts Section */
        .alerts-list {
            margin-top: 12px;
            max-height: 180px;
            overflow-y: auto;
        }

        .alert-item {
            display: flex;
            justify-content: space-between;
            background: #080c14;
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 8px;
            border-left: 3px solid var(--accent-blue);
            font-size: 0.95rem;
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>Crypto Terminal</h1>
            <p>Live Node.js market aggregation & algorithmic alerting module</p>
        </header>

        <div class="dashboard-grid">
            <div class="card">
                <div class="crypto-header">
                    <span class="crypto-name">Bitcoin (BTC)</span>
                    <span class="badge">Live</span>
                </div>
                <div class="price" id="btc-price">Fetching...</div>
            </div>

            <div class="card">
                <div class="crypto-header">
                    <span class="crypto-name">Ethereum (ETH)</span>
                    <span class="badge eth">Live</span>
                </div>
                <div class="price" id="eth-price">Fetching...</div>
            </div>

            <div class="card">
                <div class="form-title">Trigger Rules Setup</div>
                <div class="input-group">
                    <label>Token Symbol</label>
                    <input type="text" id="coin-input" placeholder="e.g., BTC, ETH">
                </div>
                <div class="input-group">
                    <label>Target Threshold Price (USD)</label>
                    <input type="text" id="price-input" placeholder="e.g., 95000">
                </div>
                <button onclick="setAlert()">Deploy Rule Engine</button>
                <div id="alert-message"></div>
            </div>

            <div class="card">
                <div class="form-title" style="color: var(--accent-blue);">Active Deployed Rules</div>
                <div class="alerts-list" id="active-alerts-container">
                    <p style="color: var(--text-muted); font-size: 0.9rem;">No active conditions deployed.</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Main orchestration tracking routine
        async function updateDashboardMetrics() {
            try {
                // 1. Fetch latest prices
                const priceResponse = await fetch('http://localhost:3000/api/crypto');
                const cryptoData = await priceResponse.json();
                
                const btc = cryptoData.find(c => c.id === 'btc');
                const eth = cryptoData.find(c => c.id === 'eth');

                if (btc) document.getElementById('btc-price').innerText = `$${btc.price.toLocaleString()}`;
                if (eth) document.getElementById('eth-price').innerText = `$${eth.price.toLocaleString()}`;

                // 2. Sync with rules engine state
                const engineResponse = await fetch('http://localhost:3000/api/alerts/sync');
                const engineData = await engineResponse.json();

                // Handle Active Matrix Rendering
                renderActiveRules(engineData.active);

                // Handle system alert triggers
                if (engineData.triggered.length > 0) {
                    engineData.triggered.forEach(alert => {
                        window.alert(`🔔 ALGO ENGINE SIGNAL:\n\n${alert.coin} target breached!\nThreshold configuration: ≥ $${alert.targetPrice.toLocaleString()}\nExecuted execution price: $${alert.firedAtPrice.toLocaleString()}`);
                    });
                }

            } catch (error) {
                console.error("Dashboard out of sync with terminal service:", error);
            }
        }

        // Initialize execution sequence loop every 3 seconds
        updateDashboardMetrics();
        setInterval(updateDashboardMetrics, 3000);

        // Send alert configurations to backend engine
        async function setAlert() {
            const coin = document.getElementById('coin-input').value;
            const targetPrice = document.getElementById('price-input').value;
            const msgDiv = document.getElementById('alert-message');

            try {
                const response = await fetch('http://localhost:3000/api/alerts', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ coin, targetPrice })
                });

                const result = await response.json();

                if (!response.ok) {
                    msgDiv.className = "error";
                    msgDiv.innerText = `❌ Error: ${result.error}`;
                } else {
                    msgDiv.className = "success";
                    msgDiv.innerText = `🚀 System status: ${result.message}`;
                    
                    document.getElementById('coin-input').value = '';
                    document.getElementById('price-input').value = '';

                    renderActiveRules(result.currentAlerts);
                }
            } catch (error) {
                msgDiv.className = "error";
                msgDiv.innerText = "❌ Local Node communication failure.";
            }
        }

        // Render data arrays safely into grid matrix card
        function renderActiveRules(alerts) {
            const container = document.getElementById('active-alerts-container');
            if (!alerts || alerts.length === 0) {
                container.innerHTML = `<p style="color: var(--text-muted); font-size: 0.9rem;">No active conditions deployed.</p>`;
                return;
            }

            container.innerHTML = alerts.map(alert => `
                <div class="alert-item">
                    <span style="font-weight:600; color:#fff;">${alert.coin}</span>
                    <span style="color: var(--accent-green);">≥ $${Number(alert.targetPrice).toLocaleString()}</span>
                </div>
            `).join('');
        }
    </script>
</body>
</html>
