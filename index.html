<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crypto Price Tracker</title>
    <style>
        body { font-family: sans-serif; background: #121214; color: white; text-align: center; padding: 50px; }
        .box { background: #202024; padding: 30px; border-radius: 8px; display: inline-block; box-shadow: 0 4px 10px rgba(0,0,0,0.5); margin-bottom: 20px; min-width: 320px; }
        h1 { color: #00e676; margin-bottom: 10px; font-size: 1.8rem; }
        h2 { color: #00e676; font-size: 1.5rem; margin-top: 10px; }
        input { padding: 10px; border-radius: 4px; border: 1px solid #333; background: #1a1a1a; color: white; width: 80%; margin-bottom: 12px; font-size: 1rem; }
        button { background: #00e676; border: none; padding: 12px 24px; font-weight: bold; border-radius: 4px; cursor: pointer; color: #121214; font-size: 1rem; }
        button:hover { background: #00b358; }
        .message { margin-top: 15px; font-weight: bold; font-size: 1rem; }
        .error { color: #ff5252; }
        .success { color: #00e676; }
    </style>
</head>
<body>

    <div class="box">
        <h1 id="btc-price">Bitcoin: Fetching...</h1>
        <h2 id="eth-price">Ethereum: Fetching...</h2>
    </div>

    <br>

    <div class="box">
        <h3>Create Price Alert</h3>
        <input type="text" id="coin-input" placeholder="Enter coin (e.g., BTC, ETH)"><br>
        <input type="text" id="price-input" placeholder="Enter target price"><br>
        <button onclick="setAlert()">Set Alert</button>
        <div id="alert-message" class="message"></div>
    </div>

    <script>
        async function fetchPrices() {
            try {
                const response = await fetch('http://localhost:3000/api/crypto');
                const data = await response.json();
                
                const btc = data.find(coin => coin.id === 'btc');
                const eth = data.find(coin => coin.id === 'eth');

                if (btc) document.getElementById('btc-price').innerText = `Bitcoin (BTC): $${btc.price.toLocaleString()}`;
                if (eth) document.getElementById('eth-price').innerText = `Ethereum (ETH): $${eth.price.toLocaleString()}`;
            } catch (error) {
                console.error("Error syncing with backend:", error);
            }
        }

        fetchPrices();
        setInterval(fetchPrices, 3000);

        async function setAlert() {
            const coin = document.getElementById('coin-input').value;
            const targetPrice = document.getElementById('price-input').value;
            const feedbackMessage = document.getElementById('alert-message');

            feedbackMessage.className = "message"; 
            feedbackMessage.innerText = "Processing...";

            try {
                const response = await fetch('http://localhost:3000/api/alerts', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ coin, targetPrice })
                });

                const result = await response.json();

                if (!response.ok) {
                    feedbackMessage.classList.add('error');
                    feedbackMessage.innerText = `❌ ${result.error}`;
                } else {
                    feedbackMessage.classList.add('success');
                    feedbackMessage.innerText = `✅ ${result.message}`;
                    document.getElementById('coin-input').value = '';
                    document.getElementById('price-input').value = '';
                }
            } catch (error) {
                feedbackMessage.classList.add('error');
                feedbackMessage.innerText = "❌ Backend server seems unreachable.";
            }
        }
    </script>
</body>
</html>
